server:
  port: 8085

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:mysql://www.thyagoquintas.com.br:3306/engenharia_67?createDatabaseIfNotExist=false
    username: engenharia_67
    password: ariranha
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    connection-timeout: 5000ms
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        multiplier: 2.0
        max-attempts: 3
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 50
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0

app:
  rabbitmq:
    queues:
      client:
        query: clientQueryQueue
        response: clientResponseQueue
      order:
        created: orderCreatedQueue
        updated: orderUpdatedQueue
      payment:
        webhook: paymentWebhookQueue
      email:
        order: orderEmailQueue
      logistics:
        request: logisticsRequestQueue
    timeout:
      client-query: 30s
      payment-process: 60s

mercado-pago:
  access-token: TEST-4349823955039015-051621-7d9c5a738d3d201c85183d941c51e30f-1806080864
  pix:
    payer:
      email: pagador@exemplo.com
      first-name: Nome
      last-name: Sobrenome
      identification-type: CPF
      identification-number: 12345678900
    description: "NexBuy - Ecommerce"
    expiration-minutes: 15
    payment-method: pix

order:
  payment:
    timeout-minutes: 15
    max-retries: 3
  status:
    initial: pending
    after-payment: confirmed
    allowed-transitions:
      pending: [confirmed, cancelled]
      confirmed: [preparing, cancelled]
      preparing: [ready, cancelled]
      ready: [delivered, cancelled]
      delivered: []
      cancelled: []
  email:
    notifications-enabled: true
    templates:
      order-created: order_created.html
      payment-approved: payment_approved.html
      order-delivered: order_delivered.html

logging:
  level:
    com.fabidoces_microservices.order_service: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true

