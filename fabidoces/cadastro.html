<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/x-icon" href="src/images/FabiDoces-logo.svg">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

</head>

<body>

    <div class="header-container">
        <header>
            <button id="icon-profile" onclick="location.href='login.html'">
                <img src="src/icones/icon-provile.png" alt="ícone pessoa">
            </button>
            <div class="logo-header"></div>
            <button id="shopping-cart" onclick="location.href='carrinho.html'">
                <img src="src/icones/icon-carrinho.png" alt="ícone carrinho">
            </button>
        </header>

        <hr class="header-hr">
        <nav>
            <button class="button-menu" onclick="location.href='index.html'">Início</button>
            <button class="button-menu" onclick="location.href='cardapio.html'">Cardápio</button>
            <button class="button-menu" onclick="location.href='sobre.html'">Sobre</button>
        </nav>
    </div>

    <div class="title-form">
        <h2>Cadastre-se</h2>
    </div>

    <div class="main-content">
        <div class="cadastro-container">
            <div class="imagem-formulario">
                <img src="src/images/mulher-doce.jpg" alt="Imagem decorativa">
            </div>

            <div class="formulario-cadastro">
                <div class="title">
                    <h2>Cadastro</h2>
                </div>

                <form id="cadastro">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Nome">
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="E-mail">
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="CPF">
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone" placeholder="Telefone">
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Senha">
                    </div>

                    <div class="form-group">
                        <label for="confirma-senha">Confirme sua Senha</label>
                        <input type="password" id="confirma-senha" name="confirma-senha"
                            placeholder="Confirme sua Senha">
                    </div>

                    <button type="submit" class="login-button">Cadastre-se</button>
                </form>

            </div>
        </div>
    </div>

    <div class="register-link">
        <p>Já tem uma conta? <a href="login.html">Login</a></p>
    </div>

    <footer id="contato" class="footer-container">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="src/images/FabiDoces-logo.png" alt="Logo FabiDoces">
            </div>

            <div class="footer-divider"></div>

            <div class="footer-info">
                <p>E-mail: contatofabidoces@gmail.com</p>
                <p>Telefone: 11 9887-6264</p>
                <p>@fabidoces</p>
            </div>
        </div>
        <div class="footer-copyright">
            <p>Copyright © 2025. Todos os Direito Reservados </p>
        </div>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="js/cadastro/cadastro.js"></script>
</body>

</html>
