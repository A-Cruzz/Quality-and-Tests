<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

   <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>
<div style="margin: auto; Max-Width: 300px">
    <div id="paymentBrick_container"></div>
</div>
    
    
    <script>
    fetch("/createPreference", { method: "POST" })
    .then(response => response.json())
    .then(preferenceId => {
    
        const mp = new MercadoPago('TEST-196e0e86-ba32-417e-b4fe-83ad3ac519d5', {
            locale: 'pt-BR' // Opcional: define o idioma
        });

        // Obtém o builder de Bricks
        const bricksBuilder = mp.bricks();

        // Função para renderizar o Payment Brick
        const renderPaymentBrick = async () => {
            const settings = {
                initialization: {
                    amount: 100, // Valor total (para métodos que não usam preferenceId)
                    preferenceId: "<PREFERENCE_ID>", // Substitua pelo ID real gerado no backend
                },
                customization: {
                    paymentMethods: {
                        ticket: "all", // Boleto
                        bankTransfer: "all", // Transferência bancária (Pix)
                        creditCard: "all", // Cartão de crédito
                        debitCard: "all", // Cartão de débito
                        mercadoPago: "all", // Usar saldo da conta Mercado Pago
                    },
                },
                callbacks: {
                    onReady: () => {
                        console.log("Brick pronto! Pode ocultar loaders aqui.");
                    },
                    onSubmit: ({ selectedPaymentMethod, formData }) => {
                        // Envia os dados do pagamento para seu backend
                        return new Promise((resolve, reject) => {
                            fetch("/process_payment", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                },
                                body: JSON.stringify(formData),
                            })
                            .then((response) => response.json())
                            .then(() => resolve())
                            .catch((error) => {
                                console.error("Erro no pagamento:", error);
                                reject();
                            });
                        });
                    },
                    onError: (error) => {
                        console.error("Erro no Brick:", error);
                    },
                },
            };

            // Renderiza o Brick
            window.paymentBrickController = await bricksBuilder.create(
                "payment",
                "paymentBrick_container",
                settings
            );
        };
    })
        // Chama a função para renderizar o Brick
        renderPaymentBrick();
    </script>
</body>
</html>
